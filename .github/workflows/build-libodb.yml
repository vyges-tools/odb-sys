# SPDX-License-Identifier: Apache-2.0
# Per-arch build of the standalone libodb from the pinned OpenROAD subtree.
# Manual only (workflow_dispatch) — each run spins up 3 legs incl. a macOS runner (billed 10x),
# so we don't auto-burn Actions minutes; trigger deliberately when the pin or build changes.
#
# ONE build per platform (x86_64 / arm64 Linux, Apple Silicon):
#   1. cmake-build libodb + odb_smoke from source (fmt/spdlog/abseil are built FROM SOURCE at the
#      pinned versions — never the system's, which lag and would shadow the pins).
#   2. smoke-test a real .odb round-trip + MEASURE the glibc floor from the smoke binary.
#   3. assemble the shippable bundle (static .a's + headers) with a provenance manifest.json.
#   4. `cargo test` REUSES that build via VYGES_ODB_PREBUILT_DIR (no second C++ compile) — the
#      per-arch correctness proof of the cxx bridge -> shim -> libodb.
# Previously this was two parallel jobs (test + bundle), each compiling the whole C++ stack — the
# duplicate heavy build doubled minutes and was the leg that kept OOM/hang-failing on Linux.
name: build-libodb

# workflow_dispatch → build + upload the per-platform bundle as a 90-day CI artifact.
# push a tag `v*`   → additionally PUBLISH the bundle (.a's + headers + manifest.json) to a
#                     durable GitHub Release, so the prebuilt libodb + provenance never expire.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the Release + attach bundles on a tag

jobs:
  build:
    name: build-${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64, base: "ubuntu-24.04" }
          - { os: ubuntu-24.04-arm, label: linux-arm64,  base: "ubuntu-24.04" }
          - { os: macos-15,         label: macos-arm64,  base: "macos>=11.0"  }   # Apple Silicon, Xcode 16 (new enough for cxx, stable for fmt 11.0.2; macos-latest/Xcode 26.5 breaks fmt consteval)
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain (Linux)
        if: runner.os == 'Linux'
        # Boost (headers) + zlib + binutils(objdump, for the glibc-floor measurement). fmt/spdlog/
        # abseil are built from source by CMake — installing the system copies would shadow the pins.
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ git binutils bison libboost-dev libboost-iostreams-dev libbz2-dev zlib1g-dev

      - name: Toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake boost bison   # bison for the LEF/DEF parsers; NOT fmt/spdlog/abseil

      - uses: dtolnay/rust-toolchain@stable

      - name: Fetch pinned odb subtree (sparse)
        run: scripts/fetch-odb-src.sh

      - name: Configure + build libodb + odb_smoke (from source, static)
        run: |
          OSX=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            OSX="-DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_PREFIX_PATH=$(brew --prefix)"
            export PATH="$(brew --prefix bison)/bin:$PATH"  # brew bison is keg-only + newer than macOS's 2.x
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DVYGES_ODB_SMOKE=ON $OSX
          # Build ONLY odb_smoke (pulls in libodb + the abseil subset odb actually uses). The
          # default `all` target also compiles abseil libs odb never links (flags/status/...).
          # BOUND parallelism to ncpu: a bare `-j` means UNLIMITED jobs under make, which spawns
          # far more than ncpu heavy C++ compiles at once, blows past the runner's RAM, and gets
          # it OOM/shutdown-killed (143). ncpu matches what the cargo builds (which passed) used.
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cmake --build build --target odb_smoke --parallel "$JOBS"

      - name: Smoke test (round-trip a real .odb)
        run: |
          ./build/odb_smoke test/fixtures/counter.odb /tmp/rt.odb
          echo "libodb.a: $(du -h build/libodb.a | cut -f1)"

      - name: Conformance gate (OpenROAD's odb GTests vs our libodb)
        # Runs OpenROAD's OWN gtests against our standalone libodb — behavioral conformance +
        # drift tripwire. Only TestGeom builds standalone today (the rest need OpenROAD's tst/STA
        # framework); see docs/openroad/opendb-conformance-gate.md for the parity roadmap.
        run: |
          [ "${{ runner.os }}" = "macOS" ] && export PATH="$(brew --prefix bison)/bin:$PATH"
          cmake -S . -B build -DVYGES_ODB_GTEST=ON >/dev/null
          cmake --build build --target odb_gtest --parallel "$(nproc 2>/dev/null || sysctl -n hw.ncpu)"
          ./build/odb_gtest

      - name: Measure runtime floor
        id: floor
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            FLOOR=$(objdump -T build/odb_smoke | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | uniq | tail -1)
            echo "glibc_floor=${FLOOR#GLIBC_}" >> "$GITHUB_OUTPUT"
          else
            echo "glibc_floor=n/a (macos>=11.0)" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble bundle (VYGES_ODB_PREBUILT_DIR layout) + provenance manifest
        run: |
          set -eu
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          OR_SHA=$(grep -E '^\s+commit:' openroad-pin.yaml | head -1 | sed 's/.*commit:[[:space:]]*//; s/[[:space:]]*#.*//')
          FMT=$(grep -E '^\s+fmt:'    openroad-pin.yaml | sed 's/.*"\(.*\)".*/\1/')
          ABSL=$(grep -E '^\s+abseil:' openroad-pin.yaml | sed 's/.*"\(.*\)".*/\1/')
          SPD=$(grep -E '^\s+spdlog:' openroad-pin.yaml | sed 's/.*"\(.*\)".*/\1/')

          mkdir -p prebuilt/lib prebuilt/include
          # every static archive: libodb + the fetched fmt/spdlog/abseil pins
          cp build/libodb.a prebuilt/lib/
          find build/_deps -name '*.a' -exec cp {} prebuilt/lib/ \;
          # headers the consumer's shim compiles against
          cp -R vendor/OpenROAD/src/odb/include/odb prebuilt/include/
          cp -R vendor/OpenROAD/src/utl/include/utl prebuilt/include/
          cp -R build/_deps/fmt-src/include/fmt       prebuilt/include/
          cp -R build/_deps/spdlog-src/include/spdlog prebuilt/include/
          cp -R build/_deps/absl-src/absl             prebuilt/include/
          cp vendor/OpenROAD/LICENSE prebuilt/OPENROAD-LICENSE-BSD3.txt   # BSD-3 binary compliance

          cat > prebuilt/manifest.json <<EOF
          {
            "component": "libodb",
            "target": "${{ matrix.label }}",
            "built_utc": "$NOW",
            "build_base": "${{ matrix.base }}",
            "glibc_floor": "${{ steps.floor.outputs.glibc_floor }}",
            "cxx_standard": "20",
            "openroad_commit": "$OR_SHA",
            "deps_from_source": { "fmt": "$FMT", "abseil": "$ABSL", "spdlog": "$SPD" },
            "static": ["libodb", "fmt", "spdlog", "abseil"],
            "dynamic": ["glibc", "libstdc++", "zlib"]
          }
          EOF
          echo "--- manifest.json ---"; cat prebuilt/manifest.json

      - name: cargo test (reuses the built libodb via VYGES_ODB_PREBUILT_DIR — no second C++ build)
        env:
          VYGES_ODB_PREBUILT_DIR: ${{ github.workspace }}/prebuilt
        run: cargo test --release --verbose

      - name: Upload prebuilt libodb bundle
        uses: actions/upload-artifact@v4
        with:
          # Extract + point VYGES_ODB_PREBUILT_DIR at it to link without a from-source build.
          name: libodb-${{ matrix.label }}
          path: prebuilt
          if-no-files-found: error

      - name: Package bundle + manifest (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # libodb-<platform>.tar.gz IS the VYGES_ODB_PREBUILT_DIR layout (lib/ + include/ +
          # manifest.json). Also surface manifest.json standalone so it's viewable on the Release.
          tar -C prebuilt -czf "libodb-${{ matrix.label }}.tar.gz" .
          ( sha256sum "libodb-${{ matrix.label }}.tar.gz" 2>/dev/null \
            || shasum -a 256 "libodb-${{ matrix.label }}.tar.gz" ) > "libodb-${{ matrix.label }}.tar.gz.sha256"
          cp prebuilt/manifest.json "manifest-${{ matrix.label }}.json"

      - name: Attach bundle + manifest to the Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libodb-${{ matrix.label }}.tar.gz
            libodb-${{ matrix.label }}.tar.gz.sha256
            manifest-${{ matrix.label }}.json
