# vyges-odb-sys — pinned OpenROAD source for the standalone libodb build.
# Matches the vyges-openroad distribution pin so libodb tracks the shipped tool.
# Bump deliberately (manual), then re-run the build workflow.
upstream:
  source: https://github.com/The-OpenROAD-Project/OpenROAD
  commit: b5624809f29048e1f9ce9e83eb562620c652e084   # == vyges-openroad 2026.07.2
  subtree:                                            # only these are sparse-checked-out
    - src/odb
    - src/utl
    - cmake
# C++ deps built FROM SOURCE at these pinned versions + static-linked (not the system's, which
# lag and break the compile). These + the build base go into the release provenance manifest.
deps:
  fmt:    "11.0.2"        # fmtlib/fmt
  abseil: "20250127.0"    # abseil/abseil-cpp
  spdlog: "v1.15.3"       # gabime/spdlog (built with SPDLOG_FMT_EXTERNAL against the pinned fmt)
  # boost: headers only (system); zlib: system (dynamic)
license:
  spdx: BSD-3-Clause                                  # OpenROAD source
notes: >
  Standalone libodb links WITHOUT tcl, swig, or-tools, or any OpenROAD engine. v1 adds LEF/DEF I/O
  (lefin/lefout/defin/defout + the si2 LEF/DEF parser libs; the parsers are BISON-generated, so
  BISON is a build-time dep — no flex). fmt/spdlog/abseil are built from source (static); only
  glibc + zlib are dynamic, so the binary is portable across Linux distros with glibc >= the build
  base. Requires C++20.
