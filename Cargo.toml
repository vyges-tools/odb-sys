[package]
name = "vyges-opendb-lib"
version = "0.0.4"
edition = "2021"
license = "Apache-2.0"
description = "Standalone build + low-level FFI for OpenROAD's OpenDB (libodb) — no tcl/swig/engines."
repository = "https://github.com/vyges-tools/opendb-lib"
links = "odb"
build = "build.rs"

[features]
# Machine-generated setter surface (scripts/generate-bindings.py). OFF by default: writes are
# L2/governance-gated, so the broad auto-generated edit surface is opt-in, not linked into the
# default read-only build.
gen-write = []

[dependencies]
cxx = "1"

[build-dependencies]
cxx-build = "1"
cmake = "0.1"
